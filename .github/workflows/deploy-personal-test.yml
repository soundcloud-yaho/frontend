name: Deploy to S3 and CloudFront (personal test - 리뷰용, 팀 CI와 별개)

# ⚠️ 개인 학습/테스트용 워크플로우입니다.
# - 팀 공식 배포는 .github/workflows/deploy-s3.yaml 을 사용합니다.
# - 이 파일은 main 브랜치 push 시 실행되도록 되어 있어(팀 기본 브랜치는 master),
#   현재 상태로는 팀 레포에서 자동 실행되지 않습니다.
# - 필요한 Secrets(AWS_ACCESS_KEY_ID 등)도 개인 AWS 계정 기준이라 팀 레포엔 없습니다.
# - 리뷰 후 필요 없으면 삭제, 필요하면 팀 CI 방식(deploy-s3.yaml)에 맞춰 재작성 예정입니다.

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소 코드 내려받기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. AWS 인증 정보 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 3. S3에 파일 동기화
      #    --delete: 로컬에 없는 파일은 S3에서도 삭제 (완전 동기화)
      - name: Sync files to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*"

      # 4. CloudFront 캐시 무효화
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
